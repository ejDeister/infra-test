<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Beer</title>
    <link rel="stylesheet" href="./styles/styles.css">
    <script type="module" src="./scripts/editBeer.js" defer></script>
</head>
<body>

    <div class="page-header">
        <div>
            <h1>Edit Beer</h1>
            <p class="text-muted" style="margin-top:4px; font-size:0.9rem;">Update your notes</p>
        </div>
    </div>

    <div class="container">

        <div class="nav-row">
            <button type="button" onclick="window.location.href='index.html'">← Home</button>
        </div>

        <form id="editBeerForm" enctype="multipart/form-data">
            <input type="hidden" id="beerId" name="id">

            <div class="field">
                <label for="name">Name <span class="required-star">*</span></label>
                <input type="text" id="name" name="name">
                <span id="nameValid" class="field-error"></span>
            </div>

            <div class="field">
                <label for="rating">Rating (1–5) <span class="required-star">*</span></label>
                <input type="number" id="rating" name="rating" min="1" max="5">
                <span id="ratingValid" class="field-error"></span>
            </div>

            <div class="field">
                <label>Current Photo</label>
                <img id="currentImage" src="" alt="No image available"
                     style="display:block; max-width:220px; border-radius:8px; border:2px solid var(--border); margin-top:6px;">
            </div>

            <div class="field">
                <label for="image">Replace Photo</label>
                <input type="file" id="image" name="image" accept="image/*">
                <span id="imageValid" class="field-error"></span>
            </div>

            <div class="field">
                <label for="type">Type <span class="required-star">*</span></label>
                <input type="text" id="type" name="type">
                <span id="typeValid" class="field-error"></span>
            </div>

            <div class="field">
                <label for="brewery">Brewery</label>
                <input type="text" id="brewery" name="brewery">
            </div>

            <div class="field">
                <label for="description">Tasting Notes</label>
                <textarea id="description" name="description"></textarea>
            </div>

            <div class="field">
                <label for="location">Location</label>
                <input type="text" id="location" name="location">
            </div>

            <div class="field">
                <label>Date Added</label>
                <span id="date" class="text-muted" style="font-size:0.9rem;"></span>
            </div>

            <div class="form-actions">
                <input type="submit" value="💾 Save Changes" id="submit">
                <button type="button" onclick="window.location.href='index.html'">Cancel</button>
            </div>

        </form>
    </div>

</body>
</html>
